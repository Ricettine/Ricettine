<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ricettine — La Gazzetta della Cucina</title>
<meta name="description" content="Ricettine: ricette italiane in stile gazzetta, con porzioni regolabili e procedimento per induzione o fuoco." />

<!-- Editorial typefaces: Bodoni (an Italian typeface) for the masthead, Spectral for reading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700;0,6..96,900;1,6..96,500&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<!-- Cross-platform flags (works on Windows too, unlike emoji flags) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />

<style>
:root{
  --paper:#F4EFE2;        /* warm newsprint */
  --paper-2:#EDE6D4;      /* boxed panels */
  --ink:#1B1712;          /* espresso near-black */
  --ink-soft:#4A443A;
  --muted:#8A8272;        /* captions / credit */
  --rosso:#A81E22;        /* Italian printer's red — used sparingly */
  --oliva:#5B6236;        /* basil/olive secondary */
  --line:#211D17;
  --hair:rgba(27,23,18,.28);
  --dot:rgba(27,23,18,.55);
  --shadow:0 1px 0 rgba(27,23,18,.12);
  --maxw:1140px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:"Spectral",Georgia,serif;font-weight:400;line-height:1.55;
  font-size:18px;
  /* faint paper grain */
  background-image:
    radial-gradient(rgba(27,23,18,.020) 1px, transparent 1.4px);
  background-size:3px 3px;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ---------- layout shell ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.rule{border:0;border-top:1px solid var(--line);margin:0}
.rule--double{border:0;border-top:3px double var(--line);margin:0}
.rule--thin{border:0;border-top:1px solid var(--hair)}

/* ---------- masthead ---------- */
header.masthead{padding-top:14px}
.topline{display:flex;justify-content:space-between;align-items:flex-end;
  font-family:"Spectral";font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-soft);padding-bottom:8px;gap:14px;flex-wrap:wrap}
.topline .edition{color:var(--rosso);font-weight:600}
.brand{ text-align:center;padding:10px 0 6px }
.brand h1{
  font-family:"Bodoni Moda",serif;font-weight:900;font-optical-sizing:auto;
  font-size:clamp(52px,11vw,132px);line-height:.9;margin:0;letter-spacing:.5px;
}
.brand .motto{font-style:italic;color:var(--ink-soft);font-size:clamp(13px,2.6vw,17px);margin-top:8px;letter-spacing:.02em}
.dateline{display:flex;justify-content:space-between;align-items:center;gap:14px;
  font-family:"Spectral";font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-soft);padding:8px 0}

/* flags */
.flags{display:flex;gap:8px;align-items:center}
.flags button{
  all:unset;cursor:pointer;line-height:0;border-radius:2px;
  outline:2px solid transparent;outline-offset:2px;opacity:.55;transition:opacity .18s, box-shadow .18s;
  box-shadow:0 0 0 1px var(--hair);
}
.flags button .fi{width:26px;height:18px;border-radius:2px}
.flags button:hover{opacity:.9}
.flags button[aria-current="true"]{opacity:1;box-shadow:0 0 0 2px var(--rosso)}
.flags button:focus-visible{outline-color:var(--rosso)}

/* section nav */
nav.sections{display:flex;justify-content:center;flex-wrap:wrap;gap:0;
  font-family:"Spectral";text-transform:uppercase;letter-spacing:.16em;font-size:13.5px;
  padding:2px 0}
nav.sections a{padding:12px 20px;color:var(--ink-soft);position:relative;font-weight:500;transition:color .15s}
nav.sections a + a{border-left:1px solid var(--hair)}
nav.sections a:hover{color:var(--ink)}
nav.sections a[aria-current="true"]{color:var(--rosso)}
nav.sections a[aria-current="true"]::after{content:"";position:absolute;left:20px;right:20px;bottom:5px;height:2px;background:var(--rosso)}

/* ---------- front page grid ---------- */
main{padding:26px 0 60px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:6px 0 16px}
.section-head h2{font-family:"Bodoni Moda",serif;font-weight:700;font-size:clamp(26px,5vw,40px);margin:0}
.section-head .kicker{font-family:"Spectral";text-transform:uppercase;letter-spacing:.18em;font-size:12px;color:var(--rosso)}

.frontpage{display:grid;grid-template-columns:2fr 1fr;gap:0}
.frontpage > .lead{border-right:1px solid var(--hair);padding-right:28px}
.frontpage > .aside{padding-left:28px;display:flex;flex-direction:column}
@media(max-width:820px){
  .frontpage{grid-template-columns:1fr}
  .frontpage > .lead{border-right:0;padding-right:0;border-bottom:3px double var(--line);padding-bottom:20px;margin-bottom:20px}
  .frontpage > .aside{padding-left:0}
}

/* article card */
.card{cursor:pointer;display:block;margin-bottom:22px}
.card:last-child{margin-bottom:0}
.card .figure{position:relative;overflow:hidden;background:var(--paper-2);border:1px solid var(--hair)}
.card .headline{font-family:"Bodoni Moda",serif;font-weight:700;line-height:1.02;margin:12px 0 4px;
  transition:color .15s}
.card:hover .headline{color:var(--rosso)}
.card .stand{color:var(--ink-soft);font-size:15px;line-height:1.45;font-style:italic}
.card .byline{font-family:"Spectral";text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.card .byline .dot{color:var(--hair)}

.lead .card .headline{font-size:clamp(30px,5.4vw,46px)}
.lead .card .stand{font-size:18px}
.aside .card{border-bottom:1px solid var(--hair);padding-bottom:20px}
.aside .card:last-child{border-bottom:0}
.aside .card .headline{font-size:22px}
.aside .card .figure{aspect-ratio:16/10}
.lead .card .figure{aspect-ratio:3/2}

/* ---------- photo / halftone treatment ---------- */
.photo{position:relative;overflow:hidden;background:var(--paper-2)}
.photo img{width:100%;height:100%;object-fit:cover;
  filter:grayscale(1) contrast(1.12) brightness(1.03) sepia(.06);
  transition:filter .35s ease}
.photo::after{ /* halftone dot screen */
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(var(--dot) 22%, transparent 23%);
  background-size:3.2px 3.2px;mix-blend-mode:multiply;opacity:.28;
  transition:opacity .35s}
body.color .photo img{filter:grayscale(0) contrast(1.03) saturate(1.02)}
body.color .photo::after{opacity:0}

/* illustration placeholder (engraved look) */
.placeholder{width:100%;height:100%;display:block}
.placeholder svg{width:100%;height:100%;display:block}

figure.lead-photo{margin:0}
figure.lead-photo .photo{aspect-ratio:3/2;border:1px solid var(--line)}
figcaption{font-family:"Spectral";font-size:13px;color:var(--muted);padding-top:8px;
  display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--hair);padding-bottom:10px}
figcaption .credit{font-style:italic}

/* ---------- recipe article ---------- */
.article{display:none}
.article.active{display:block}
.list-view{display:block}
.list-view.hidden{display:none}

.backbar{display:flex;align-items:center;gap:10px;font-family:"Spectral";
  text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:var(--rosso);
  cursor:pointer;padding:4px 0;margin-bottom:8px;width:max-content}
.backbar:hover{text-decoration:underline}

.art-head{text-align:center;max-width:820px;margin:8px auto 20px}
.art-kicker{font-family:"Spectral";text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--rosso)}
.art-head h2{font-family:"Bodoni Moda",serif;font-weight:900;font-size:clamp(34px,7vw,64px);line-height:.98;margin:10px 0 8px}
.art-stand{font-style:italic;color:var(--ink-soft);font-size:clamp(16px,2.6vw,20px)}
.art-meta{display:flex;justify-content:center;flex-wrap:wrap;gap:0;margin-top:16px;
  font-family:"Spectral";text-transform:uppercase;letter-spacing:.13em;font-size:12px;color:var(--ink-soft)}
.art-meta span{padding:0 16px}
.art-meta span + span{border-left:1px solid var(--hair)}
.art-meta b{color:var(--ink);font-weight:600}

.art-body{max-width:960px;margin:0 auto}

/* control panel — the live "riquadro" */
.panel{border:1px solid var(--line);background:var(--paper-2);margin:22px 0;
  display:grid;grid-template-columns:1fr 1fr;gap:0}
.panel .cell{padding:16px 20px}
.panel .cell + .cell{border-left:1px solid var(--hair)}
.panel .lbl{font-family:"Spectral";text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:var(--muted);margin-bottom:10px}
@media(max-width:640px){.panel{grid-template-columns:1fr}.panel .cell + .cell{border-left:0;border-top:1px solid var(--hair)}}

.stepper{display:flex;align-items:center;gap:14px}
.stepper button{all:unset;cursor:pointer;width:40px;height:40px;display:grid;place-items:center;
  border:1px solid var(--line);border-radius:50%;font-size:22px;line-height:1;
  font-family:"Spectral";transition:background .15s,color .15s}
.stepper button:hover{background:var(--ink);color:var(--paper)}
.stepper button:focus-visible{outline:2px solid var(--rosso);outline-offset:2px}
.stepper button[disabled]{opacity:.35;cursor:not-allowed}
.stepper .count{font-family:"Bodoni Moda",serif;font-weight:700;font-size:32px;min-width:2ch;text-align:center}
.stepper .unit{font-family:"Spectral";font-size:14px;color:var(--ink-soft)}

.toggle{display:inline-flex;border:1px solid var(--line);border-radius:2px;overflow:hidden}
.toggle button{all:unset;cursor:pointer;padding:10px 16px;font-family:"Spectral";
  font-size:14px;letter-spacing:.04em;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.toggle button + button{border-left:1px solid var(--line)}
.toggle button[aria-pressed="true"]{background:var(--oliva);color:var(--paper)}
.toggle button:focus-visible{outline:2px solid var(--rosso);outline-offset:-2px}
.toggle .ic{font-size:15px}

.viewtoggle{all:unset;cursor:pointer;font-family:"Spectral";font-size:13px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--hair);padding-bottom:2px}
.viewtoggle:hover{color:var(--rosso);border-color:var(--rosso)}

/* two column body: factbox + procedure */
.cols{display:grid;grid-template-columns:340px 1fr;gap:34px;margin-top:28px}
@media(max-width:820px){.cols{grid-template-columns:1fr;gap:24px}}

.factbox{border:1px solid var(--line);padding:20px;height:max-content;background:linear-gradient(0deg,rgba(27,23,18,.015),transparent)}
.factbox h3, .procedure h3{font-family:"Bodoni Moda",serif;font-weight:700;font-size:22px;margin:0 0 4px;
  display:flex;align-items:baseline;justify-content:space-between}
.factbox .subttl{font-family:"Spectral";text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--rosso);margin-bottom:14px}
.ingredients{list-style:none;margin:0;padding:0}
.ingredients li{display:flex;justify-content:space-between;gap:12px;align-items:baseline;
  padding:9px 0;border-bottom:1px dotted var(--hair)}
.ingredients li:last-child{border-bottom:0}
.ingredients li.ing-head{display:block;border-bottom:0;padding:16px 0 6px;font-family:"Spectral";text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--rosso);font-weight:600}
.ingredients li.ing-head:first-child{padding-top:0}
.ingredients .name{}
.ingredients .qty{font-family:"Spectral";font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap;color:var(--ink)}
.ingredients .qty.qb{font-style:italic;font-weight:400;color:var(--muted)}
.ing-note{font-size:13px;color:var(--muted);font-style:italic}

.equip{margin-top:22px;border-top:3px double var(--line);padding-top:16px}
.equip h4{font-family:"Spectral";text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--muted);margin:0 0 10px}
.equip ul{list-style:none;margin:0;padding:0}
.equip li{padding:5px 0;font-size:15.5px;display:flex;gap:10px}
.equip li::before{content:"—";color:var(--oliva)}

.procedure h3{border-bottom:3px double var(--line);padding-bottom:8px;display:block}
.steps{list-style:none;margin:16px 0 0;padding:0;counter-reset:step}
.steps li{position:relative;padding:0 0 22px 56px;counter-increment:step}
.steps li::before{content:counter(step);position:absolute;left:0;top:-4px;
  font-family:"Bodoni Moda",serif;font-weight:700;font-size:34px;color:var(--rosso);line-height:1}
.steps li p{margin:0}
.steps li:first-child p::first-letter{
  font-family:"Bodoni Moda",serif;font-weight:900;font-size:3.1em;line-height:.72;
  float:left;padding:6px 10px 0 0;color:var(--ink)}
.method-tag{display:inline-block;font-family:"Spectral";text-transform:uppercase;letter-spacing:.1em;
  font-size:10.5px;color:var(--paper);background:var(--oliva);padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:middle}

/* footer */
footer{border-top:3px double var(--line);margin-top:40px;padding:26px 0 60px;
  text-align:center;font-family:"Spectral";color:var(--muted);font-size:13px;letter-spacing:.04em}
footer .fbrand{font-family:"Bodoni Moda",serif;font-weight:700;font-size:22px;color:var(--ink);letter-spacing:.5px}

/* fade in */
@media(prefers-reduced-motion:no-preference){
  .fade{animation:fade .4s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}
</style>
</head>

    { name:{it:"Sale fino", en:"Fine salt"}, qty:null, unit:"qb" },
  ],
  equipment:[
    {it:"Pentola capiente", en:"Large pot"},
    {it:"Due padelle ampie", en:"Two wide frying pans"},
    {it:"Marisa o cucchiaio di legno", en:"Spatula or wooden spoon"},
    {it:"Schiumarola o scolapasta", en:"Slotted spoon or colander"},
    {it:"Coltellino", en:"Small knife"},
  ],
  steps:[
    { text:{ it:"Pulisci le cime di rapa: elimina le foglie esterne e i gambi più duri e tieni solo le foglie interne e le cime fiorite. Sciacquale, scolale e asciugale bene.",
             en:"Trim the broccoli rabe: discard the outer leaves and tougher stems, keeping only the inner leaves and flowering tops. Rinse, drain and pat dry." } },
    { induction:{ it:"Metti sul fuoco una pentola con abbondante acqua salata a potenza massima per portarla a bollore.",
                  en:"Set a large pot of well-salted water on full power to bring it to the boil." },
      gas:{ it:"Metti sul fuoco una pentola con abbondante acqua salata a fiamma viva e con il coperchio, per accelerare il bollore.",
            en:"Set a large pot of well-salted water over a high flame with the lid on, to speed up the boil." } },
    { induction:{ it:"In una padella ampia scalda metà dell'olio a potenza media e tosta il pangrattato mescolando con la marisa finché è ben dorato; l'induzione tiene una temperatura costante, quindi basta mescolare di tanto in tanto. Mettilo da parte.",
                  en:"In a wide pan warm half the oil on medium power and toast the breadcrumbs, stirring with a spatula until deep golden; induction holds a steady heat, so you only need to stir now and then. Set aside." },
      gas:{ it:"In una padella ampia scalda metà dell'olio a fiamma media e tosta il pangrattato mescolando spesso, perché il gas scalda anche i bordi e il pangrattato brucia in un attimo, finché è ben dorato. Mettilo da parte.",
            en:"In a wide pan warm half the oil on a medium flame and toast the breadcrumbs, stirring often, because gas heats the sides too and breadcrumbs burn in a flash, until deep golden. Set aside." } },
    { text:{ it:"Appena l'acqua bolle, tuffa le cime di rapa e lessale per circa 5 minuti.",
             en:"As soon as the water boils, add the broccoli rabe and cook for about 5 minutes." } },
    { induction:{ it:"Intanto prepara il soffritto: in un'altra padella scalda l'olio rimasto con l'aglio schiacciato in camicia e le acciughe scolate, a potenza medio-bassa. Mescola con un cucchiaio di legno per sciogliere le acciughe; bastano pochi minuti. Togli l'aglio e spegni.",
                  en:"Meanwhile make the soffritto: in another pan warm the remaining oil with the crushed unpeeled garlic and the drained anchovies on medium-low. Stir with a wooden spoon to melt the anchovies; it takes only a few minutes. Remove the garlic and turn off." },
      gas:{ it:"Intanto prepara il soffritto: in un'altra padella scalda l'olio rimasto con l'aglio schiacciato in camicia e le acciughe scolate, a fiamma bassa, tenendo d'occhio l'aglio perché sul gas brucia facilmente. Mescola per sciogliere le acciughe; bastano pochi minuti. Togli l'aglio e spegni.",
            en:"Meanwhile make the soffritto: in another pan warm the remaining oil with the crushed unpeeled garlic and the drained anchovies on a low flame, keeping an eye on the garlic as it scorches easily over gas. Stir to melt the anchovies; a few minutes is enough. Remove the garlic and turn off." } },
    { text:{ it:"Nella stessa pentola delle cime aggiungi le orecchiette e cuoci insieme per altri 5 minuti circa, mescolando delicatamente.",
             en:"Add the orecchiette to the same pot as the greens and cook together for about 5 more minutes, stirring gently." } },
    { induction:{ it:"Scola orecchiette e cime direttamente nella padella del soffritto e salta a potenza media per un minuto; aggiusta di sale.",
                  en:"Drain the orecchiette and greens straight into the soffritto pan and toss on medium power for a minute; adjust the salt." },
      gas:{ it:"Scola orecchiette e cime direttamente nella padella del soffritto e salta a fiamma media per un minuto, muovendo spesso la padella; aggiusta di sale.",
            en:"Drain the orecchiette and greens straight into the soffritto pan and toss on a medium flame for a minute, shaking the pan often; adjust the salt." } },
    { text:{ it:"Spegni, impiatta e completa con un filo d'olio a crudo e il pangrattato tostato.",
             en:"Turn off, plate up and finish with a drizzle of raw oil and the toasted breadcrumbs." } },
  ],
},

{

  ingredients:[

  steps:[
    { induction:{ it:"Metti la padella sull'induzione a livello 5 con un giro d'olio EVO e lo spicchio d'aglio schiacciato in camicia. Appena l'aglio sfrigola e profuma (circa 1 minuto) versa la passata e regola di sale. Abbassa a livello 4, copri e lascia sobbollire 10-12 minuti finché si addensa. Spegni, togli l'aglio e unisci quasi tutto il basilico spezzettato a mano.",
                  en:"Set the pan on induction level 5 with a swirl of olive oil and the crushed unpeeled garlic. As soon as the garlic sizzles and smells fragrant (about 1 minute) pour in the passata and season. Lower to level 4, cover and simmer 10-12 minutes until slightly thickened. Turn off, remove the garlic and stir in most of the basil, torn by hand." },
      gas:{ it:"Scalda la padella a fiamma media con un giro d'olio EVO e lo spicchio d'aglio schiacciato in camicia. Appena l'aglio sfrigola e profuma versa la passata e regola di sale. Abbassa a fiamma medio-bassa, copri e sobbolli 10-12 minuti mescolando ogni tanto, perché sul gas i bordi scaldano di più. Spegni, togli l'aglio e unisci quasi tutto il basilico spezzettato.",
            en:"Warm the pan on a medium flame with a swirl of olive oil and the crushed unpeeled garlic. As soon as it sizzles and smells fragrant pour in the passata and season. Lower to a medium-low flame, cover and simmer 10-12 minutes, stirring now and then since gas heats the edges more. Turn off, remove the garlic and stir in most of the torn basil." } },
    { induction:{ it:"Porta l'acqua a bollore a livello 9, sala e cala la pasta. Scolala a metà del tempo indicato sulla confezione (se dice 11 minuti, scola a 5-6): deve restare molto al dente, quasi dura al cuore, perché finirà di cuocere in forno assorbendo il pomodoro.",
                  en:"Bring the water to the boil on level 9, salt it and add the pasta. Drain at half the time on the packet (if it says 11 minutes, drain at 5-6): it should stay very al dente, almost firm at the core, as it finishes in the oven soaking up the tomato." },
      gas:{ it:"Porta l'acqua a bollore a fiamma viva con il coperchio, sala e cala la pasta. Scolala a metà del tempo indicato (se dice 11 minuti, scola a 5-6): deve restare molto al dente, perché finirà di cuocere in forno.",
            en:"Bring the water to the boil on a high flame with the lid on, salt it and add the pasta. Drain at half the stated time (if it says 11 minutes, drain at 5-6): keep it very al dente, as it finishes in the oven." } },
    { text:{ it:"Accendi il forno in modalità statica a 200 °C. Scola la pasta e versala nella ciotola capiente. Aggiungi 3/4 del sugo, quasi tutto il parmigiano e la mozzarella a dadini ben scolata; mescola velocemente.",
             en:"Turn the oven to static mode at 200 °C. Drain the pasta and tip it into the large bowl. Add 3/4 of the sauce, most of the parmesan and the well-drained diced mozzarella; mix quickly." } },
    { text:{ it:"Ungi la pirofila con un cucchiaio di sugo sul fondo, versa la pasta condita e coprila con il sugo rimasto, l'ultimo parmigiano e qualche foglia di basilico.",
             en:"Spread a spoon of sauce over the base of the dish, add the dressed pasta and cover with the remaining sauce, the last of the parmesan and a few basil leaves." } },
    { text:{ it:"Inforna a metà altezza per 15-20 minuti. Negli ultimi 3 minuti passa al grill per la crosticina dorata. Lascia riposare 5 minuti prima di servire.",
             en:"Bake in the middle of the oven for 15-20 minutes. For the last 3 minutes switch to the grill for a golden crust. Let it rest 5 minutes before serving." } },
  ],
},

  caption:{ it:"Ravioli di ricotta in crema al limone e parmigiano.",
            en:"Ricotta ravioli in a lemon-parmesan cream." },
  ingredients:[
    { name:{it:"Ravioli freschi", en:"Fresh ravioli"}, qty:250, unit:"g", note:{it:"il tuo pacco", en:"your pack"} },

    { name:{it:"Limone biologico", en:"Organic lemon"}, qty:0.5, unit:"", note:{it:"scorza grattugiata", en:"zest, grated"} },
    { name:{it:"Noce moscata", en:"Nutmeg"}, qty:null, unit:"qb", note:{it:"un pizzico", en:"a pinch"} },
    { name:{it:"Basilico o spinacini", en:"Basil or baby spinach"}, qty:null, unit:"qb", note:{it:"facoltativo", en:"optional"} },
    { name:{it:"Olio extravergine d'oliva", en:"Extra-virgin olive oil"}, qty:null, unit:"qb" },

  equipment:[

    {it:"Schiumarola", en:"Slotted spoon"},
  ],
  steps:[
    { text:{ it:"Mentre l'acqua si scalda, nella ciotola capiente metti la ricotta, il parmigiano, la scorza di limone, un pizzico di noce moscata e una macinata di pepe. Schiaccia con una forchetta fino a una crema omogenea: non scaldare la ricotta sul fuoco, o i grassi si separano e diventa granulosa.",
             en:"While the water heats, in the large bowl combine the ricotta, parmesan, lemon zest, a pinch of nutmeg and a grind of pepper. Mash with a fork to a smooth cream: don't heat the ricotta on the stove, or the fats split and it turns grainy." } },
    { induction:{ it:"Porta l'acqua a bollore a livello 9, sala e cala i ravioli. I ravioli freschi cuociono pochissimo, di solito 3-4 minuti.",
                  en:"Bring the water to the boil on level 9, salt it and add the ravioli. Fresh ravioli cook very quickly, usually 3-4 minutes." },
      gas:{ it:"Porta l'acqua a bollore a fiamma viva con il coperchio, sala e cala i ravioli; poi tieni la fiamma media, così non sobbollono troppo forte e non si aprono. Cuociono 3-4 minuti.",
            en:"Bring the water to the boil on a high flame with the lid on, salt it and add the ravioli; then keep the flame medium so they don't boil too hard and burst. They cook in 3-4 minutes." } },
    { text:{ it:"Un minuto prima di scolare, preleva un mestolo scarso di acqua di cottura bollente e versalo nella ciotola con la ricotta. Mescola subito con una frusta o una forchetta: l'acqua e l'amido trasformano la ricotta in una crema fluida e vellutata.",
             en:"A minute before draining, take a scant ladle of the boiling cooking water and pour it into the bowl with the ricotta. Stir at once with a whisk or fork: the water and starch turn the ricotta into a smooth, silky cream." } },
    { text:{ it:"Scola i ravioli con la schiumarola direttamente nella ciotola (evita lo scolapasta, sono delicati). Mescola dolcemente dal basso verso l'alto per avvolgerli nella crema; se asciuga troppo, aggiungi un altro goccio di acqua di cottura.",
             en:"Lift the ravioli with a slotted spoon straight into the bowl (skip the colander, they're delicate). Fold gently from the bottom up to coat them in the cream; if it dries out, add another splash of cooking water." } },
    { text:{ it:"Servi subito con un filo d'olio EVO a crudo e, se ti piace, un'ultima leggera grattugiata di scorza di limone.",
             en:"Serve at once with a thread of raw olive oil and, if you like, a last light grating of lemon zest." } },
  ],
},

/* ===================== SECONDI ===================== */
{
  id:"salmone-datterini-olive-capperi",
  section:"secondi", featured:true,
  servingsBase:2, servingsUnit:"persone",
  time:{prep:15, cook:12}, difficulty:"facile", image:null,
  title:{ it:"Salmone ai datterini, olive e capperi", en:"Salmon with datterini, olives & capers" },
  standfirst:{ it:"Un piatto unico mediterraneo che cuoce nel suo vapore: niente di secco, tutto profumato.",
               en:"A Mediterranean one-pan dish that cooks in its own steam: nothing dry, all fragrant." },
  caption:{ it:"Salmone con datterini, olive e capperi in padella.",
            en:"Pan-cooked salmon with datterini tomatoes, olives and capers." },
  ingredients:[
    { name:{it:"Filetti di salmone", en:"Salmon fillets"}, qty:2, unit:"", note:{it:"o merluzzo", en:"or cod"} },
    { name:{it:"Pomodori datterini", en:"Datterini tomatoes"}, qty:200, unit:"g", note:{it:"tagliati a metà", en:"halved"} },
    { name:{it:"Olive nere o verdi", en:"Black or green olives"}, qty:12, unit:"", note:{it:"snocciolate", en:"pitted"} },
    { name:{it:"Capperi", en:"Capers"}, qty:1, unit:"", note:{it:"cucchiaio, dissalati", en:"tablespoon, desalted"} },
    { name:{it:"Aglio", en:"Garlic"}, qty:1, unit:"", note:{it:"spicchio", en:"clove"} },
    { name:{it:"Origano o prezzemolo", en:"Oregano or parsley"}, qty:null, unit:"qb", note:{it:"fresco", en:"fresh"} },
    { name:{it:"Olio extravergine d'oliva", en:"Extra-virgin olive oil"}, qty:null, unit:"qb" },
    { name:{it:"Sale e pepe", en:"Salt and pepper"}, qty:null, unit:"qb" },
  ],
  equipment:[
    {it:"Padella antiaderente capiente", en:"Large non-stick pan"},
    {it:"Coperchio", en:"Lid"},
  ],
  steps:[
    { text:{ it:"Dissala i capperi: sciacquali sotto acqua fredda corrente, poi, per una nota sapida decisa, lasciali in ammollo 10-15 minuti (30 per toglierlo quasi del tutto, cambiando l'acqua a metà). Scolali e asciugali bene con la carta, altrimenti schizzeranno nell'olio caldo.",
             en:"Desalt the capers: rinse under cold running water, then, for a boldly savoury note, soak them 10-15 minutes (30 to remove almost all the salt, changing the water halfway). Drain and dry them well on paper, or they'll spit in the hot oil." } },
    { induction:{ it:"Metti nella padella un cucchiaino d'olio EVO, l'aglio schiacciato intero e i capperi. Accendi l'induzione a livello 5 e scalda circa 1 minuto, finché l'aglio profuma.",
                  en:"Put a teaspoon of olive oil, the whole crushed garlic and the capers in the pan. Turn induction to level 5 and heat for about 1 minute, until the garlic is fragrant." },
      gas:{ it:"Metti nella padella un cucchiaino d'olio EVO, l'aglio schiacciato intero e i capperi. Accendi il gas a fiamma media e scalda circa 1 minuto tenendo d'occhio l'aglio, che sul gas brucia in fretta.",
            en:"Put a teaspoon of olive oil, the whole crushed garlic and the capers in the pan. Set the gas to a medium flame and heat about 1 minute, keeping an eye on the garlic, which scorches fast over gas." } },
    { induction:{ it:"Unisci i datterini tagliati a metà e le olive, un pizzico di sale (poco, i capperi sono già sapidi) e una macinata di pepe. Salta a livello 6 per 3-4 minuti muovendo la padella, finché i pomodorini appassiscono e rilasciano il succo.",
                  en:"Add the halved datterini and the olives, a pinch of salt (just a little, the capers are already savoury) and a grind of pepper. Sauté on level 6 for 3-4 minutes, shaking the pan, until the tomatoes soften and release their juice." },
      gas:{ it:"Unisci i datterini a metà e le olive, un pizzico di sale e una macinata di pepe. Salta a fiamma medio-alta 3-4 minuti muovendo spesso la padella, finché i pomodorini appassiscono.",
            en:"Add the halved datterini and the olives, a pinch of salt and a grind of pepper. Sauté on a medium-high flame 3-4 minutes, shaking the pan often, until the tomatoes soften." } },
    { induction:{ it:"Asciuga bene i filetti con la carta, sposta i pomodorini ai lati e adagia il pesce sul fondo della padella. Copri subito e abbassa a livello 4: cuoci coperto 6-8 minuti secondo lo spessore. Il vapore lo cuoce senza seccarlo e non serve girarlo.",
                  en:"Pat the fillets dry, push the tomatoes to the sides and lay the fish on the base of the pan. Cover at once and lower to level 4: cook covered 6-8 minutes depending on thickness. The steam cooks it without drying it and there's no need to turn it." },
      gas:{ it:"Asciuga bene i filetti, sposta i pomodorini ai lati e adagia il pesce sul fondo. Copri e abbassa a fiamma medio-bassa; con il gas controlla che il centro non scaldi troppo ed eventualmente ruota la padella. Cuoci coperto 6-8 minuti.",
            en:"Pat the fillets dry, push the tomatoes to the sides and lay the fish on the base. Cover and lower to a medium-low flame; with gas, check the centre isn't too hot and rotate the pan if needed. Cook covered 6-8 minutes." } },
    { text:{ it:"Spegni, elimina l'aglio e aggiungi origano o prezzemolo fresco tritato. Servi i filetti caldi coperti con il sughetto di datterini, olive e capperi.",
             en:"Turn off, remove the garlic and add oregano or chopped fresh parsley. Serve the fillets hot, covered with the datterini, olive and caper sauce." } },
  ],
},

{
  id:"torta-crema-limone",
  section:"dolci", featured:true,
  servingsBase:8, servingsUnit:"fette",
  time:{prep:30, cook:35}, difficulty:"media", image:null,
  title:{ it:"Torta con crema al limone", en:"Cake with lemon custard" },
  standfirst:{ it:"Pan di Spagna all'olio e crema al limone: soffice, fresca, senza burro.",

    { heading:true, name:{it:"Per la base soffice", en:"For the sponge"} },

    { name:{it:"Sale", en:"Salt"}, qty:null, unit:"qb", note:{it:"un pizzico", en:"a pinch"} },
    { heading:true, name:{it:"Per la crema al limone", en:"For the lemon custard"} },
    { name:{it:"Latte intero", en:"Whole milk"}, qty:250, unit:"g" },
    { name:{it:"Tuorli", en:"Egg yolks"}, qty:2, unit:"" },
    { name:{it:"Zucchero", en:"Sugar"}, qty:75, unit:"g" },
    { name:{it:"Amido di mais", en:"Cornstarch"}, qty:25, unit:"g", note:{it:"Maizena", en:"cornflour"} },
    { name:{it:"Limone biologico", en:"Organic lemon"}, qty:1, unit:"", note:{it:"scorza a strisce + succo", en:"zest in strips + juice"} },
  ],
  equipment:[
    {it:"Stampo da 20-22 cm, meglio apribile", en:"20-22 cm tin, ideally springform"},
    {it:"Sbattitore elettrico", en:"Electric mixer"},
    {it:"Pentolino", en:"Small saucepan"},
    {it:"Frusta a mano", en:"Hand whisk"},
  ],
  steps:[
    { induction:{ it:"Versa il latte in un pentolino con le scorze di limone a strisce. Scalda a livello 5 quasi fino al bollore, spegni e lascia in infusione 5 minuti.",
                  en:"Pour the milk into a small pan with the strips of lemon zest. Heat on level 5 almost to the boil, turn off and infuse for 5 minutes." },
      gas:{ it:"Versa il latte in un pentolino con le scorze di limone a strisce. Scalda a fiamma media quasi fino al bollore, attento che non trabocchi, spegni e lascia in infusione 5 minuti.",
            en:"Pour the milk into a small pan with the strips of lemon zest. Heat on a medium flame almost to the boil, watching it doesn't boil over, turn off and infuse for 5 minutes." } },
    { text:{ it:"In una ciotola sbatti i 2 tuorli con lo zucchero e l'amido di mais fino a una pastella liscia e senza grumi.",
             en:"In a bowl whisk the 2 yolks with the sugar and cornstarch to a smooth, lump-free paste." } },
    { induction:{ it:"Togli le scorze dal latte, versane un po' a filo sulla pastella mescolando, poi riporta tutto nel pentolino a livello 3-4. Mescola con la frusta finché la crema si addensa (circa 2 minuti da quando sobbolle). Spegni, aggiungi il succo di limone filtrato, copri con pellicola a contatto e falla raffreddare del tutto.",
                  en:"Remove the zest from the milk, pour a little into the paste while stirring, then return everything to the pan on level 3-4. Whisk until the cream thickens (about 2 minutes once it simmers). Turn off, add the strained lemon juice, cover with cling film touching the surface and let it cool completely." },
      gas:{ it:"Togli le scorze dal latte, versane un po' a filo sulla pastella mescolando, poi riporta tutto nel pentolino a fiamma molto bassa: sul gas il calore è meno delicato, quindi mescola senza sosta con la frusta finché si addensa (circa 2 minuti da quando sobbolle). Spegni, aggiungi il succo di limone filtrato, copri con pellicola a contatto e fai raffreddare.",
            en:"Remove the zest, pour a little milk into the paste while stirring, then return everything to the pan on a very low flame: gas heat is less gentle, so whisk constantly until it thickens (about 2 minutes once simmering). Turn off, add the strained lemon juice, cover with cling film on the surface and cool." } },
    { text:{ it:"Preriscalda il forno a 180 °C statico. Monta le 3 uova intere con lo zucchero per 5 minuti fino a un composto chiaro e spumoso. A bassa velocità unisci l'olio, l'acqua e la scorza grattugiata. Setaccia farina e lievito e incorporali delicatamente dal basso verso l'alto. Versa nello stampo imburrato e infarinato.",
             en:"Preheat the oven to 180 °C static. Whip the 3 whole eggs with the sugar for 5 minutes until pale and fluffy. On low speed add the oil, water and grated zest. Sift in the flour and baking powder and fold gently from the bottom up. Pour into the buttered and floured tin." } },
    { text:{ it:"Inforna per 30-35 minuti (prova stecchino). Sforna e lascia raffreddare completamente su una gratella.",
             en:"Bake for 30-35 minutes (test with a skewer). Turn out and cool completely on a rack." } },
    { text:{ it:"Taglia la torta fredda a metà in orizzontale. Lavora la crema fredda con una frusta per renderla di nuovo setosa e spalmala sulla base. Richiudi con il disco superiore e spolvera con zucchero a velo.",
             en:"Slice the cold cake in half horizontally. Work the cold cream with a whisk to make it silky again and spread it over the base. Close with the top disc and dust with icing sugar." } },
  ],
},
];

/* =========================================================================
   3) STATE
   ========================================================================= */
const state = {
  lang: (localStorage.getItem("ric_lang") || "it"),
  section: "primi",
  view: "list",          // "list" | "recipe"
  recipeId: null,
  people: 2,
  method: "induction",   // "induction" | "gas"
  color: false,
};
if(!I18N[state.lang]) state.lang = "it";

/* =========================================================================
   4) HELPERS
   ========================================================================= */
const t = (k) => I18N[state.lang][k];
const tf = (obj) => obj ? (obj[state.lang] || obj.it || Object.values(obj)[0]) : "";
const el = (id) => document.getElementById(id);
const recipeById = (id) => RECIPES.find(r => r.id === id);
const usesStovetop = (r) => r.steps.some(s => s.induction || s.gas);

function fmtPieces(n){
  const whole = Math.floor(n + 1e-9);
  let frac = n - whole;
  const glyph = {0:"", 0.25:"¼", 0.5:"½", 0.75:"¾"};
  let key = Math.round(frac*4)/4;
  let carry = 0;
  if(key === 1){ carry = 1; key = 0; }
  const w = whole + carry;
  const g = glyph[key] || "";
  if(w === 0 && g) return g;
  if(g) return w + " " + g;
  return String(w);
}

function scaledQty(ing, factor){
  if(ing.qty == null) return {qb:true, text:t("qb")};
  let v = (ing.scale === false) ? ing.qty : ing.qty * factor;
  if(ing.unit === "g" || ing.unit === "ml"){
    v = v >= 100 ? Math.round(v/5)*5 : Math.round(v);
    return {qb:false, text:`${v} ${ing.unit}`};
  }
  // countable pieces (eggs, cloves, slices, glasses…)
  v = Math.round(v*4)/4;
  return {qb:false, text:fmtPieces(v)};
}

function unitWord(unitKey, count){
  const map = { persone:["persona","persone"], bicchieri:["bicchiere","bicchieri"], fette:["fetta","fette"] };
  const pair = map[unitKey] || map.persone;
  return t(count === 1 ? pair[0] : pair[1]);
}

function currentDateStr(){
  const locales = {it:"it-IT",en:"en-GB",de:"de-DE",fr:"fr-FR",es:"es-ES"};
  const d = new Date();
  try { return d.toLocaleDateString(locales[state.lang]||"it-IT",
        {weekday:"long", day:"numeric", month:"long", year:"numeric"}); }
  catch(e){ return d.toDateString(); }
}

/* engraved-style illustration placeholder, per section */
function placeholder(section){
  const ink = "#1B1712";
  const art = {
    primi:`<circle cx="100" cy="70" r="52" fill="none" stroke="${ink}" stroke-width="2"/>
      <circle cx="100" cy="70" r="40" fill="none" stroke="${ink}" stroke-width="1"/>
      <path d="M70 70 q30 -26 60 0" fill="none" stroke="${ink}" stroke-width="1.4"/>
      <path d="M66 76 q34 -20 68 0" fill="none" stroke="${ink}" stroke-width="1.4"/>
      <path d="M74 82 q26 -14 52 0" fill="none" stroke="${ink}" stroke-width="1.4"/>`,
    secondi:`<path d="M46 70 q26 -30 74 -18 q30 8 34 18 q-4 10 -34 18 q-48 12 -74 -18 z" fill="none" stroke="${ink}" stroke-width="2"/>
      <path d="M154 70 l16 -12 v24 z" fill="none" stroke="${ink}" stroke-width="2"/>
      <circle cx="70" cy="66" r="3.2" fill="${ink}"/>
      <path d="M92 60 q14 10 0 20 M108 58 q16 12 0 24 M124 60 q14 10 0 20" fill="none" stroke="${ink}" stroke-width="1"/>`,
    dolci:`<path d="M58 92 h84 l-6 -34 h-72 z" fill="none" stroke="${ink}" stroke-width="2"/>
      <path d="M64 58 q36 -18 72 0" fill="none" stroke="${ink}" stroke-width="2"/>
      <path d="M100 32 v16 M100 32 q-8 6 0 12" fill="none" stroke="${ink}" stroke-width="1.6"/>
      <path d="M72 72 h56 M70 82 h60" stroke="${ink}" stroke-width="0.8"/>`,
    cocktail:`<path d="M64 40 h72 l-30 40 v28 h14 v4 h-40 v-4 h14 v-28 z" fill="none" stroke="${ink}" stroke-width="2"/>
      <circle cx="118" cy="52" r="7" fill="none" stroke="${ink}" stroke-width="1.4"/>
      <path d="M118 45 v14 M111 52 h14" stroke="${ink}" stroke-width="1"/>`,
  }[section] || "";
  return `<div class="placeholder"><svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${t("illustration")}">
    <defs><pattern id="ht-${section}" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(27,23,18,.30)"/></pattern></defs>
    <rect width="200" height="140" fill="var(--paper-2)"/>
    <rect width="200" height="140" fill="url(#ht-${section})"/>
    ${art}
  </svg></div>`;
}

function figureHTML(recipe){
  if(recipe.image){
    return `<div class="photo"><img src="${recipe.image}" alt="${tf(recipe.title)}" loading="lazy"></div>`;
  }
  return `<div class="photo">${placeholder(recipe.section)}</div>`;
}

/* =========================================================================
   5) RENDER — chrome (masthead, flags, nav, static labels)
   ========================================================================= */
function renderChrome(){
  document.documentElement.lang = state.lang;
  document.body.className = (state.color ? "color " : "") + state.lang;

  el("motto").textContent = t("motto");
  el("tl-edition").textContent = t("edition");
  el("tl-price").textContent = t("price");
  el("dateline-left").textContent = currentDateStr();
  el("foot-line").textContent = t("foot");

  // flags
  const flags = el("flags");
  flags.innerHTML = LANGS.map(l =>
    `<button data-lang="${l.code}" title="${l.label}" aria-label="${l.label}"
      aria-current="${l.code===state.lang}"><span class="fi fi-${l.flag}"></span></button>`).join("");

  // section nav
  el("nav").innerHTML = SECTIONS.map(s =>
    `<a href="#/${s}" data-section="${s}" aria-current="${s===state.section && state.view==='list'}">${t("sections")[s]}</a>`).join("");
}

/* =========================================================================
   6) RENDER — front page (a section's list of recipes)
   ========================================================================= */
function renderList(){
  el("listView").classList.remove("hidden");
  el("articleView").classList.remove("active");
  el("sectionTitle").textContent = t("sections")[state.section];
  el("sectionKicker").textContent = t("frontpage");

  const items = RECIPES.filter(r => r.section === state.section);
  if(items.length === 0){
    el("frontpage").innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-style:italic;font-size:20px">${t("empty")}</div>`;
    return;
  }
  const lead = items[0];
  const rest = items.slice(1);

  const cardHTML = (r) => `
    <a class="card" href="#/${r.section}/${r.id}" data-recipe="${r.id}">
      <div class="figure">${figureHTML(r)}</div>
      <div class="headline">${tf(r.title)}</div>
      <div class="stand">${tf(r.standfirst)}</div>
      <div class="byline">
        <span>${t("prep")} ${r.time.prep+r.time.cook} ${t("min")}</span><span class="dot">◆</span>
        <span>${t(r.difficulty)}</span>
      </div>
    </a>`;

  el("frontpage").innerHTML = `
    <div class="lead">${ lead ? cardHTML(lead) : "" }</div>
    <div class="aside">${ rest.map(cardHTML).join("") }</div>`;

  el("listView").classList.add("fade");
  setTimeout(()=>el("listView").classList.remove("fade"), 420);
}

/* =========================================================================
   7) RENDER — a single recipe article
   ========================================================================= */
function renderRecipe(){
  const r = recipeById(state.recipeId);
  if(!r){ goSection(state.section); return; }

  el("listView").classList.add("hidden");
  const view = el("articleView");
  view.classList.add("active");

  const factor = state.people / r.servingsBase;
  const stove = usesStovetop(r);

  // ingredients
  const ingHTML = r.ingredients.map(ing => {
    if(ing.heading) return `<li class="ing-head">${tf(ing.name)}</li>`;
    const q = scaledQty(ing, factor);
    const note = ing.note ? ` <span class="ing-note">(${tf(ing.note)})</span>` : "";
    return `<li><span class="name">${tf(ing.name)}${note}</span>
      <span class="qty${q.qb?' qb':''}">${q.text}</span></li>`;
  }).join("");

  // equipment
  const equipHTML = r.equipment.map(e => `<li>${tf(e)}</li>`).join("");

  // steps (swap induction/gas)
  const stepsHTML = r.steps.map(s => {
    let text, tag = "";
    if(s.text){ text = tf(s.text); }
    else {
      text = tf(state.method === "gas" ? s.gas : s.induction);
      tag = `<span class="method-tag">${state.method==='gas'?t('fire'):t('induction')}</span>`;
    }
    return `<li><p>${text}${tag}</p></li>`;
  }).join("");

  // servings label
  const servLabel = `${t("ingredients")} <span class="subttl-inline"></span>`;
  const unitLabel = unitWord(r.servingsUnit, state.people);

  // method cell (hidden when the recipe never touches a hob)
  const methodCell = stove ? `
    <div class="cell">
      <div class="lbl">${t("methodLbl")}</div>
      <div class="toggle" role="group" aria-label="${t("methodLbl")}">
        <button data-method="induction" aria-pressed="${state.method==='induction'}"><span class="ic">⚡</span>${t("induction")}</button>
        <button data-method="gas" aria-pressed="${state.method==='gas'}"><span class="ic">🔥</span>${t("fire")}</button>
      </div>
    </div>` : `
    <div class="cell">
      <div class="lbl">${t("viewLbl")}</div>
      <button class="viewtoggle" id="viewToggle">${state.color ? t("seeBW") : t("seeColor")}</button>
    </div>`;

  // when method IS shown, put the photo toggle in the meta row instead
  const photoToggleInline = stove ? `
    <div style="text-align:center;margin-top:14px">
      <button class="viewtoggle" id="viewToggle">${state.color ? t("seeBW") : t("seeColor")}</button>
    </div>` : "";

  view.innerHTML = `
    <div class="backbar" id="backbar">‹ ${t("back")}</div>
    <div class="art-head">
      <div class="art-kicker">${t("sections")[r.section]}</div>
      <h2>${tf(r.title)}</h2>
      <div class="art-stand">${tf(r.standfirst)}</div>
      <div class="art-meta">
        ${r.time.prep ? `<span>${t("prep")} <b>${r.time.prep} ${t("min")}</b></span>`:""}
        ${r.time.cook ? `<span>${t("cook")} <b>${r.time.cook} ${t("min")}</b></span>`:""}
        <span>${t("difficulty")} <b>${t(r.difficulty)}</b></span>
      </div>
    </div>

    <div class="art-body">
      <figure class="lead-photo">
        ${figureHTML(r)}
        <figcaption>
          <span>${tf(r.caption)}</span>
          <span class="credit">${r.image ? "" : t("illustration")}</span>
        </figcaption>
      </figure>

      <div class="panel">
        <div class="cell">
          <div class="lbl">${t("servingsLbl")}</div>
          <div class="stepper">
            <button id="minus" aria-label="−" ${state.people<=1?'disabled':''}>−</button>
            <span class="count" id="peopleCount" aria-live="polite">${state.people}</span>
            <button id="plus" aria-label="+" ${state.people>=20?'disabled':''}>+</button>
            <span class="unit">${unitLabel}</span>
          </div>
        </div>
        ${methodCell}
      </div>
      ${photoToggleInline}

      <div class="cols">
        <aside class="factbox">
          <h3>${t("ingredients")}</h3>
          <div class="subttl">${t("forX")} ${state.people} ${unitLabel}</div>
          <ul class="ingredients">${ingHTML}</ul>
          <div class="equip">
            <h4>${t("equipment")}</h4>
            <ul>${equipHTML}</ul>
          </div>
        </aside>
        <div class="procedure">
          <h3>${t("procedure")}</h3>
          <ol class="steps">${stepsHTML}</ol>
        </div>
      </div>
    </div>`;

  view.classList.add("fade");
  setTimeout(()=>view.classList.remove("fade"), 420);
  wireRecipeControls();
  window.scrollTo({top:0, behavior:"instant" in window ? "instant" : "auto"});
}

/* =========================================================================
   8) EVENTS
   ========================================================================= */
function wireRecipeControls(){
  const minus = el("minus"), plus = el("plus");
  if(minus) minus.onclick = () => { if(state.people>1){ state.people--; renderRecipe(); } };
  if(plus)  plus.onclick  = () => { if(state.people<20){ state.people++; renderRecipe(); } };

  document.querySelectorAll("[data-method]").forEach(b => {
    b.onclick = () => { state.method = b.dataset.method; renderRecipe(); };
  });
  const vt = el("viewToggle");
  if(vt) vt.onclick = () => { state.color = !state.color; document.body.classList.toggle("color", state.color); vt.textContent = state.color ? t("seeBW") : t("seeColor"); };

  const bb = el("backbar");
  if(bb) bb.onclick = () => { location.hash = "#/" + state.section; };
}

// flags + nav (delegated, survive re-render of chrome)
document.addEventListener("click", (e) => {
  const flag = e.target.closest("[data-lang]");
  if(flag){ setLang(flag.dataset.lang); return; }
});

function setLang(code){
  if(!I18N[code]) return;
  state.lang = code;
  localStorage.setItem("ric_lang", code);
  renderChrome();
  if(state.view === "recipe") renderRecipe(); else renderList();
}

function goSection(section){
  if(!SECTIONS.includes(section)) section = "primi";
  state.section = section;
  state.view = "list";
  state.recipeId = null;
  renderChrome();
  renderList();
}

function goRecipe(id){
  const r = recipeById(id);
  if(!r){ goSection(state.section); return; }
  state.section = r.section;
  state.recipeId = id;
  state.view = "recipe";
  state.people = r.servingsBase;                       // reset portions per recipe
  state.method = usesStovetop(r) ? "induction" : "induction";
  renderChrome();
  renderRecipe();
}

/* =========================================================================
   9) ROUTING (hash-based → deep links + back button work on GitHub Pages)
   ========================================================================= */
function router(){
  const parts = location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
  if(parts.length >= 2){ goRecipe(parts[1]); }
  else if(parts.length === 1){ goSection(parts[0]); }
  else { goSection("primi"); }
}
window.addEventListener("hashchange", router);

/* boot */
renderChrome();
router();
</script>
